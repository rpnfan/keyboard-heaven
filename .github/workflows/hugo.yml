name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # Updated: Node 24 compatible
        with:
          submodules: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3  # Updated: Node 24 compatible
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify --environment production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # Updated: Node 24 compatible
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
